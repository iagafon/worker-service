# docker-compose.local.yml
# Локальное окружение для разработки
#
# Запуск:   docker compose -f docker-compose.local.yml up -d
# Остановка: docker compose -f docker-compose.local.yml down
# Логи:     docker compose -f docker-compose.local.yml logs -f

services:
  # ---------------------------------------------------------------------------- #
  # PostgreSQL
  # ---------------------------------------------------------------------------- #
  postgres:
    container_name: "mom_bp_postgres"
    image: "postgres:16-alpine"
    restart: "unless-stopped"
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: "testuser"
      POSTGRES_PASSWORD: "testpass"
      POSTGRES_DB: "testdb"
    volumes:
      - "mom_bp_postgres_data:/var/lib/postgresql/data"
    networks:
      - "mom_bp_net"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testuser -d testdb"]
      interval: 5s
      timeout: 5s
      retries: 5

# ---------------------------------------------------------------------------- #
# Volumes
# ---------------------------------------------------------------------------- #
volumes:
  mom_bp_postgres_data: {}

# ---------------------------------------------------------------------------- #
# Networks
# ---------------------------------------------------------------------------- #
networks:
  mom_bp_net: {}

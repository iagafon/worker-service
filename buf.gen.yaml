version: v2
clean: true
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/MoM-Repo/worker-service/api/gen
plugins:
  # Стандартные Go структуры
  - protoc_builtin: go
    out: api/gen
    opt:
      - paths=source_relative

  # gRPC сервер и клиент
  - protoc_builtin: go-grpc
    out: api/gen
    opt:
      - paths=source_relative
      - require_unimplemented_servers=false

  # gRPC-Gateway
  - remote: buf.build/grpc-ecosystem/gateway
    out: api/gen
    opt:
      - paths=source_relative
inputs:
  - directory: api/proto
